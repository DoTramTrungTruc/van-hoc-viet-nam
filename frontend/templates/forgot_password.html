<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu - Văn Học Việt Nam</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/common.css">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Merriweather:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --vn-brown: #6D4C41;
            --vn-dark:  #3E2723;
            --vn-gold:  #D4AF37;
            --vn-cream: #FFF8E1;
            --g-hero:   linear-gradient(135deg, #8B4513, #D2691E);
        }

        body {
            min-height: 100vh;
            background: #f5f0e8;
            display: flex;
            flex-direction: column;
        }

        /* Page wrapper */
        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background: var(--g-hero);
            position: relative;
            overflow: hidden;
        }

        .auth-wrapper::before {
            content: '';
            position: absolute; inset: 0;
            background:
                repeating-linear-gradient(90deg, rgba(255,255,255,.04) 0, transparent 1px, transparent 40px, rgba(255,255,255,.04) 41px),
                repeating-linear-gradient(0deg,  rgba(255,255,255,.04) 0, transparent 1px, transparent 40px, rgba(255,255,255,.04) 41px);
        }

        /* Card */
        .auth-card {
            position: relative;
            background: #fff;
            border-radius: 20px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
            animation: cardIn .4s ease;
        }

        @keyframes cardIn {
            from { opacity:0; transform: translateY(24px); }
            to   { opacity:1; transform: translateY(0); }
        }

        /* Top gold bar */
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, #D4AF37, #F5D76E, #D4AF37);
            border-radius: 20px 20px 0 0;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: .5rem;
        }

        .auth-logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--vn-dark);
            margin: 0 0 .25rem;
        }

        .auth-logo p {
            font-size: .88rem;
            color: #999;
            margin: 0;
        }

        /* Step indicator */
        .step-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            margin-bottom: 2rem;
        }

        .step {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: .85rem; font-weight: 700;
        }

        .step.active {
            background: var(--g-hero);
            color: #fff;
            box-shadow: 0 4px 12px rgba(139,69,19,.35);
        }

        .step.done {
            background: #4CAF50;
            color: #fff;
        }

        .step.inactive {
            background: #eee;
            color: #bbb;
        }

        .step-line {
            flex: 1; max-width: 60px;
            height: 2px;
            background: #eee;
        }

        .step-line.done { background: #4CAF50; }

        /* Form */
        .form-group {
            margin-bottom: 1.4rem;
        }

        .form-group label {
            display: block;
            font-size: .9rem;
            font-weight: 600;
            color: var(--vn-brown);
            margin-bottom: .5rem;
        }

        .form-group input {
            width: 100%;
            padding: .9rem 1.1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color .25s, box-shadow .25s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--vn-gold);
            box-shadow: 0 0 0 3px rgba(212,175,55,.15);
        }

        .input-hint {
            font-size: .82rem;
            color: #aaa;
            margin-top: .4rem;
        }

        /* Submit button */
        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--g-hero);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s, transform .2s;
            letter-spacing: .5px;
        }

        .btn-submit:hover:not(:disabled) {
            opacity: .9;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139,69,19,.35);
        }

        .btn-submit:disabled {
            opacity: .65;
            cursor: not-allowed;
        }

        /* Alert */
        .alert {
            padding: .9rem 1.1rem;
            border-radius: 10px;
            font-size: .92rem;
            margin-bottom: 1.2rem;
            display: none;
            line-height: 1.5;
        }

        .alert.show { display: block; }

        .alert-error {
            background: #FFEBEE;
            border: 1px solid #FFCDD2;
            color: #C62828;
        }

        .alert-success {
            background: #E8F5E9;
            border: 1px solid #C8E6C9;
            color: #2E7D32;
        }

        /* Success state */
        .success-state {
            display: none;
            text-align: center;
            padding: 1rem 0;
        }

        .success-state.show { display: block; }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .success-state h3 {
            font-family: 'Playfair Display', serif;
            color: var(--vn-dark);
            font-size: 1.3rem;
            margin-bottom: .8rem;
        }

        .success-state p {
            color: #666;
            line-height: 1.7;
            font-size: .95rem;
            margin-bottom: 1.5rem;
        }

        .success-state .email-highlight {
            display: inline-block;
            background: var(--vn-cream);
            border: 1px solid var(--vn-gold);
            border-radius: 8px;
            padding: .4rem .9rem;
            font-weight: 700;
            color: var(--vn-brown);
            margin: .3rem 0 1rem;
        }

        /* Back to login */
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: .9rem;
            color: #999;
        }

        .back-link a {
            color: var(--vn-brown);
            font-weight: 600;
            text-decoration: none;
        }

        .back-link a:hover {
            color: #8B4513;
            text-decoration: underline;
        }

        /* Spinner */
        .spinner-inline {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <span class="icon">📖</span>
            <h1>Văn Học Việt Nam</h1>
            <p>Quên mật khẩu</p>
        </div>

        <!-- Step indicator -->
        <div class="step-indicator">
            <div class="step active" id="step1">1</div>
            <div class="step-line" id="line1"></div>
            <div class="step inactive" id="step2">2</div>
        </div>

        <!-- Alert -->
        <div class="alert alert-error" id="alertError"></div>

        <!-- Form -->
        <div id="formSection">
            <div class="form-group">
                <label>📧 Địa chỉ Email</label>
                <input type="email"
                       id="emailInput"
                       placeholder="Nhập email đăng ký..."
                       onkeydown="if(event.key==='Enter') sendReset()">
                <div class="input-hint">
                    Chúng tôi sẽ gửi link đặt lại mật khẩu đến email này
                </div>
            </div>

            <button class="btn-submit" id="submitBtn" onclick="sendReset()">
                🔑 Gửi link đặt lại mật khẩu
            </button>
        </div>

        <!-- Success state -->
        <div class="success-state" id="successState">
            <div class="success-icon">✉️</div>
            <h3>Email đã được gửi!</h3>
            <p>
                Chúng tôi đã gửi link đặt lại mật khẩu đến:<br>
                <span class="email-highlight" id="sentEmail"></span>
            </p>
            <p style="color:#aaa;font-size:.88rem">
                ⏱️ Link có hiệu lực trong <strong>30 phút</strong>.<br>
                Không thấy email? Kiểm tra hộp thư Spam.
            </p>
            <button class="btn-submit" onclick="resendEmail()"
                    id="resendBtn" style="margin-top:.5rem">
                🔄 Gửi lại email
            </button>
        </div>

        <div class="back-link">
            <a href="/login">← Quay lại đăng nhập</a>
        </div>

    </div>
</div>

<script src="/static/js/forgot_password.js"></script>
</body>
</html>
