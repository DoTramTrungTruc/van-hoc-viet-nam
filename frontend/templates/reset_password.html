<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Lại Mật Khẩu - Văn Học Việt Nam</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/common.css">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Merriweather:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --vn-brown: #6D4C41;
            --vn-dark:  #3E2723;
            --vn-gold:  #D4AF37;
            --vn-cream: #FFF8E1;
            --g-hero:   linear-gradient(135deg, #8B4513, #D2691E);
        }

        body { min-height:100vh; background:#f5f0e8; display:flex; flex-direction:column; }

        .auth-wrapper {
            flex:1; display:flex; align-items:center; justify-content:center;
            padding:2rem 1rem;
            background: var(--g-hero);
            position:relative; overflow:hidden;
        }

        .auth-wrapper::before {
            content:''; position:absolute; inset:0;
            background:
                repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0,transparent 1px,transparent 40px,rgba(255,255,255,.04) 41px),
                repeating-linear-gradient(0deg, rgba(255,255,255,.04) 0,transparent 1px,transparent 40px,rgba(255,255,255,.04) 41px);
        }

        .auth-card {
            position:relative; background:#fff; border-radius:20px;
            padding:3rem 2.5rem; width:100%; max-width:440px;
            box-shadow:0 20px 60px rgba(0,0,0,.25);
            animation:cardIn .4s ease;
        }

        @keyframes cardIn {
            from{opacity:0;transform:translateY(24px)}
            to  {opacity:1;transform:translateY(0)}
        }

        .auth-card::before {
            content:''; position:absolute; top:0; left:0; right:0; height:5px;
            background:linear-gradient(90deg,#D4AF37,#F5D76E,#D4AF37);
            border-radius:20px 20px 0 0;
        }

        .auth-logo { text-align:center; margin-bottom:2rem; }
        .auth-logo .icon { font-size:3rem; display:block; margin-bottom:.5rem; }
        .auth-logo h1 { font-family:'Playfair Display',serif; font-size:1.5rem; color:var(--vn-dark); margin:0 0 .25rem; }
        .auth-logo p  { font-size:.88rem; color:#999; margin:0; }

        .form-group { margin-bottom:1.4rem; }
        .form-group label { display:block; font-size:.9rem; font-weight:600; color:var(--vn-brown); margin-bottom:.5rem; }

        .input-wrapper { position:relative; }
        .form-group input {
            width:100%; padding:.9rem 3rem .9rem 1.1rem;
            border:2px solid #e0e0e0; border-radius:10px;
            font-size:1rem; transition:border-color .25s, box-shadow .25s;
            box-sizing:border-box;
        }
        .form-group input:focus {
            outline:none; border-color:var(--vn-gold);
            box-shadow:0 0 0 3px rgba(212,175,55,.15);
        }

        .toggle-pwd {
            position:absolute; right:1rem; top:50%; transform:translateY(-50%);
            background:none; border:none; cursor:pointer;
            font-size:1.1rem; color:#aaa; transition:color .2s;
        }
        .toggle-pwd:hover { color:var(--vn-brown); }

        /* Strength bar */
        .strength-bar {
            height:4px; border-radius:2px; margin-top:.5rem;
            background:#eee; overflow:hidden;
            transition:all .3s;
        }
        .strength-fill { height:100%; border-radius:2px; transition:all .4s; width:0; }
        .strength-label { font-size:.78rem; margin-top:.3rem; }

        .btn-submit {
            width:100%; padding:1rem;
            background:var(--g-hero); color:#fff; border:none;
            border-radius:10px; font-size:1rem; font-weight:700;
            cursor:pointer; transition:opacity .2s, transform .2s;
            letter-spacing:.5px;
        }
        .btn-submit:hover:not(:disabled) {
            opacity:.9; transform:translateY(-2px);
            box-shadow:0 6px 16px rgba(139,69,19,.35);
        }
        .btn-submit:disabled { opacity:.65; cursor:not-allowed; }

        .alert { padding:.9rem 1.1rem; border-radius:10px; font-size:.92rem; margin-bottom:1.2rem; display:none; line-height:1.5; }
        .alert.show { display:block; }
        .alert-error   { background:#FFEBEE; border:1px solid #FFCDD2; color:#C62828; }
        .alert-success { background:#E8F5E9; border:1px solid #C8E6C9; color:#2E7D32; }

        /* Expired state */
        .expired-state { display:none; text-align:center; }
        .expired-state.show { display:block; }
        .expired-icon { font-size:4rem; margin-bottom:1rem; }
        .expired-state h3 { font-family:'Playfair Display',serif; color:#C62828; font-size:1.3rem; margin-bottom:.8rem; }
        .expired-state p   { color:#666; line-height:1.7; font-size:.95rem; }

        /* Success state */
        .success-state { display:none; text-align:center; }
        .success-state.show { display:block; }
        .success-icon { font-size:4rem; margin-bottom:1rem; }
        .success-state h3 { font-family:'Playfair Display',serif; color:#2E7D32; font-size:1.3rem; margin-bottom:.8rem; }
        .success-state p   { color:#666; line-height:1.7; margin-bottom:1.5rem; }

        .back-link { text-align:center; margin-top:1.5rem; font-size:.9rem; color:#999; }
        .back-link a { color:var(--vn-brown); font-weight:600; text-decoration:none; }
        .back-link a:hover { color:#8B4513; text-decoration:underline; }

        .spinner-inline {
            display:inline-block; width:16px; height:16px;
            border:2px solid rgba(255,255,255,.4); border-top-color:#fff;
            border-radius:50%; animation:spin .8s linear infinite;
            vertical-align:middle; margin-right:6px;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* Checking overlay */
        .checking {
            text-align:center; padding:2rem 0; color:var(--vn-brown);
        }
        .checking .spinner-big {
            width:48px; height:48px; border:4px solid rgba(139,69,19,.2);
            border-top-color:var(--vn-brown); border-radius:50%;
            animation:spin 1s linear infinite; margin:0 auto 1rem;
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <span class="icon">🔑</span>
            <h1>Đặt Lại Mật Khẩu</h1>
            <p>Văn Học Việt Nam</p>
        </div>

        <!-- Checking token -->
        <div id="checkingState" class="checking">
            <div class="spinner-big"></div>
            <p>Đang xác thực link...</p>
        </div>

        <!-- Token expired -->
        <div id="expiredState" class="expired-state">
            <div class="expired-icon">⏰</div>
            <h3>Link đã hết hạn!</h3>
            <p>Link đặt lại mật khẩu không hợp lệ hoặc đã hết hạn (30 phút).</p>
            <a href="/forgot-password" class="btn-submit"
               style="display:inline-block;margin-top:1.2rem;text-decoration:none;padding:.9rem 2rem">
                🔄 Yêu cầu link mới
            </a>
        </div>

        <!-- Form đặt lại mật khẩu -->
        <div id="formSection" style="display:none">
            <div class="alert alert-error" id="alertError"></div>

            <div class="form-group">
                <label>🔒 Mật khẩu mới</label>
                <div class="input-wrapper">
                    <input type="password" id="newPassword"
                           placeholder="Tối thiểu 6 ký tự..."
                           oninput="checkStrength(this.value)"
                           onkeydown="if(event.key==='Enter') submitReset()">
                    <button class="toggle-pwd" type="button"
                            onclick="togglePwd('newPassword', this)">👁</button>
                </div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
            </div>

            <div class="form-group">
                <label>🔒 Xác nhận mật khẩu</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword"
                           placeholder="Nhập lại mật khẩu..."
                           onkeydown="if(event.key==='Enter') submitReset()">
                    <button class="toggle-pwd" type="button"
                            onclick="togglePwd('confirmPassword', this)">👁</button>
                </div>
            </div>

            <button class="btn-submit" id="submitBtn" onclick="submitReset()">
                ✅ Đặt lại mật khẩu
            </button>
        </div>

        <!-- Success -->
        <div id="successState" class="success-state">
            <div class="success-icon">🎉</div>
            <h3>Đặt lại thành công!</h3>
            <p>Mật khẩu của bạn đã được cập nhật.<br>Đang chuyển hướng đến trang đăng nhập...</p>
            <div style="width:100%;background:#eee;border-radius:10px;height:6px;overflow:hidden">
                <div id="progressBar"
                     style="height:100%;background:linear-gradient(90deg,#8B4513,#D2691E);
                            width:0;transition:width 3s linear;border-radius:10px">
                </div>
            </div>
        </div>

        <div class="back-link">
            <a href="/login">← Quay lại đăng nhập</a>
        </div>

    </div>
</div>
<script src="/static/js/reset_password.js"></script>
</body>
</html>
